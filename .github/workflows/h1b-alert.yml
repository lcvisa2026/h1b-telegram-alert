name: H1B Slot Alert

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check-slot:
    runs-on: ubuntu-latest

    steps:
      - name: Send heartbeat
        run: |
          curl -s \
          -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🔎 H1B Guangzhou monitor running..."
