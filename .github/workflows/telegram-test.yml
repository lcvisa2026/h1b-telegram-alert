name: Telegram Test

on:
  workflow_dispatch:

jobs:
  telegram-test:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Message
        run: |
          curl -s \
          -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Telegram Bot 测试成功！GitHub Actions 已连接。"
